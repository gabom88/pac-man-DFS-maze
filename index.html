<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>PAC-MAN</title>
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#000;color:#fff;
  font-family:'Courier New',Courier,monospace;
  overflow:hidden;touch-action:none;
  height:100%;width:100%;
  -webkit-user-select:none;user-select:none;
}
#wrap{
  display:flex;flex-direction:column;
  height:100dvh; /* dynamic viewport height - clave para móvil */
  width:100vw;
}

/* HUD compacto — una sola línea fina */
#hud{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  height:36px;
  background:#000;
  border-bottom:1px solid #222;
  font-size:12px;letter-spacing:.5px;
  white-space:nowrap;
}
#hud .hitem{display:flex;align-items:center;gap:4px;}
#hud .hval{color:#FFD700;font-weight:700;min-width:28px;text-align:right;}
.lives-icons{display:flex;gap:3px;align-items:center;}
.life-icon{width:10px;height:10px;background:#FFD700;border-radius:50%;}

/* Canvas wrapper */
#stage{
  flex:1 1 auto;
  display:flex;align-items:center;justify-content:center;
  background:#000;
  overflow:hidden;
}
#game{display:block;touch-action:none;}

/* Overlay (start / game over) */
#overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);
  z-index:10;
  gap:12px;
}
#overlay h1{font-size:clamp(22px,6vw,40px);color:#FFD700;letter-spacing:4px;text-shadow:0 0 18px #FFD70088;}
#overlay p{font-size:clamp(12px,3vw,16px);color:#aaa;text-align:center;padding:0 20px;}
#diff-btns{display:flex;gap:10px;margin-top:4px;}
.diff-btn{
  padding:10px 18px;
  border:2px solid #444;border-radius:6px;
  background:#111;color:#fff;
  font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.diff-btn span.dlabel{font-size:11px;opacity:.7;font-weight:400;}
.diff-btn:active{transform:scale(.95);}
.diff-btn.selected{border-color:#FFD700;color:#FFD700;background:#1a1500;}
#startBtn{
  margin-top:12px;
  padding:11px 40px;
  background:#FFD700;color:#000;
  border:none;border-radius:4px;
  font-family:inherit;font-size:15px;font-weight:700;letter-spacing:2px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#startBtn:active{opacity:.8;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hitem">⭐ <span id="score" class="hval">0</span></div>
    <div class="hitem">NV <span id="level" class="hval">1</span></div>
    <div class="hitem">
      <span style="color:#aaa">❤</span>
      <div class="lives-icons" id="lives-wrap"></div>
    </div>
  </div>
  <div id="stage" style="position:relative">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>PAC-MAN</h1>
      <p>Desliza para moverte</p>
      <div id="diff-btns">
        <button class="diff-btn" data-diff="easy">
          🟢 FÁCIL
          <span class="dlabel">Fantasmas lentos</span>
        </button>
        <button class="diff-btn selected" data-diff="normal">
          🟡 NORMAL
          <span class="dlabel">Fantasmas rápidos</span>
        </button>
        <button class="diff-btn" data-diff="hard">
          🔴 DIFÍCIL
          <span class="dlabel">Fantasmas veloces</span>
        </button>
      </div>
      <button id="startBtn">JUGAR</button>
    </div>
  </div>
</div>

<script>
(()=>{"use strict";

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=n=>Math.floor(Math.random()*n);
const hsl=(h,s,l)=>`hsl(${h},${s}%,${l}%)`;
const $ =id=>document.getElementById(id);

/* ═══════════════════════════════════════════
   AUDIO  (iOS-safe: resume en gesto de usuario)
═══════════════════════════════════════════ */
let AC=null, masterGain=null;

function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = .15;
    masterGain.connect(AC.destination);
  }catch(e){AC=null;}
}

function ensureRunning(){
  if(!AC) return false;
  if(AC.state==='suspended') AC.resume();
  return AC.state==='running'||AC.state==='suspended'; // optimistic
}

function tone({freq=440,dur=.08,type='square',vol=1,delay=0}){
  if(!ensureRunning()) return;
  try{
    const t=AC.currentTime+delay;
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+.005);
    g.gain.linearRampToValueAtTime(vol*.6,t+dur*.5);
    g.gain.linearRampToValueAtTime(0,t+dur+.02);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+dur+.05);
  }catch(e){}
}

let wakaT=false;
const SFX={
  eat:()=>{ wakaT=!wakaT; tone({freq:wakaT?520:480,dur:.045,vol:.8}); },
  power:()=>{ tone({freq:200,dur:.22,type:'sawtooth',vol:.7}); tone({freq:300,dur:.18,type:'sawtooth',delay:.12,vol:.7}); },
  eatGhost:()=>{ tone({freq:1200,dur:.08}); tone({freq:900,dur:.08,delay:.1}); },
  die:()=>{ [220,190,160,130].forEach((f,i)=>tone({freq:f,dur:.18,type:'triangle',delay:i*.12,vol:.7})); },
  level:()=>{ [600,760,880,990].forEach((f,i)=>tone({freq:f,dur:.14,delay:i*.12})); },
  start:()=>{ [660,880,990].forEach((f,i)=>tone({freq:f,dur:.12,delay:i*.14})); },
  life:()=>{ [880,1175,1568].forEach((f,i)=>tone({freq:f,dur:.12,delay:i*.13})); },
};

/* ═══════════════════════════════════════════
   CANVAS & RESIZE
═══════════════════════════════════════════ */
const cvs=$('game'), ctx=cvs.getContext('2d');
let TILE=18, COLS=15, ROWS=27;

function vpSize(){
  const vv=window.visualViewport;
  return{
    w: vv?vv.width :window.innerWidth,
    h: vv?vv.height:window.innerHeight
  };
}
const HUD_H=36;
function fit(){
  const {w,h}=vpSize();
  const avH=Math.max(120, h - HUD_H - 4);
  TILE=Math.max(10,Math.min(28,Math.floor(avH/ROWS)));
  cvs.width =COLS*TILE;
  cvs.height=ROWS*TILE;
  const scale=Math.min(w/(COLS*TILE), avH/(ROWS*TILE), 1.5);
  cvs.style.width =(COLS*TILE*scale|0)+'px';
  cvs.style.height=(ROWS*TILE*scale|0)+'px';
}
fit();
window.addEventListener('resize',fit);
window.addEventListener('orientationchange',fit);
if(window.visualViewport) window.visualViewport.addEventListener('resize',fit);

/* ═══════════════════════════════════════════
   GRID / DFS MAZE
═══════════════════════════════════════════ */
const WALL=1, PATH=0;
let grid=[], pellets=[];

function makeGrid(){
  // 1. Crear grid todo muro
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(WALL));

  // 2. DFS para generar laberinto perfecto (siempre resoluble, sin zonas aisladas)
  for(let y=1;y<ROWS;y+=2) for(let x=1;x<COLS;x+=2) grid[y][x]=PATH;
  const stack=[[1,1]], visited=new Set(['1,1']);
  const DDFS=[[2,0],[-2,0],[0,2],[0,-2]];
  while(stack.length){
    const [cx,cy]=stack[stack.length-1];
    const nb=[];
    for(const [dx,dy] of DDFS){
      const nx=cx+dx,ny=cy+dy;
      if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1&&grid[ny][nx]===PATH&&!visited.has(nx+','+ny))
        nb.push([nx,ny,dx,dy]);
    }
    if(nb.length){
      const [nx,ny,dx,dy]=nb[rnd(nb.length)];
      grid[cy+(dy/2|0)][cx+(dx/2|0)]=PATH;  // abre pared entre
      visited.add(nx+','+ny);
      stack.push([nx,ny]);
    } else stack.pop();
  }

  // 3. Bordes sólidos
  for(let x=0;x<COLS;x++){grid[0][x]=WALL;grid[ROWS-1][x]=WALL;}
  for(let y=0;y<ROWS;y++){grid[y][0]=WALL;grid[y][COLS-1]=WALL;}

  // 4. Añadir loops (ciclos extra) para que sea interesante sin romper accesibilidad
  addLoops(0.20);
}

function addLoops(ratio){
  const candidates=[];
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(grid[y][x]!==WALL) continue;
    const h=(grid[y][x-1]===PATH&&grid[y][x+1]===PATH);
    const v=(grid[y-1][x]===PATH&&grid[y+1][x]===PATH);
    if(h||v) candidates.push([x,y]);
  }
  shuffle(candidates);
  const n=Math.floor(candidates.length*ratio);
  for(let i=0;i<n;i++) grid[candidates[i][1]][candidates[i][0]]=PATH;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}}

/* ═══════════════════════════════════════════
   PELLETS
═══════════════════════════════════════════ */
function placePellets(pacSpawn,ghostSpawn){
  pellets=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  // Puntos en todas las celdas PATH interiores
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(grid[y][x]===PATH) pellets[y][x]=1;
  }
  // Quitar zona inicio pacman
  const r=2;
  for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
    const nx=pacSpawn.x+dx, ny=pacSpawn.y+dy;
    if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) pellets[ny][nx]=0;
  }
  // Quitar zona fantasmas
  for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
    const nx=ghostSpawn.x+dx, ny=ghostSpawn.y+dy;
    if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) pellets[ny][nx]=0;
  }
  // Power pellets: 4 esquinas accesibles
  const corners=[[1,1],[COLS-2,1],[1,ROWS-2],[COLS-2,ROWS-2]];
  for(const [cx,cy] of corners){
    let placed=false;
    for(let r2=0;r2<=3&&!placed;r2++){
      for(let dy=-r2;dy<=r2&&!placed;dy++) for(let dx=-r2;dx<=r2&&!placed;dx++){
        if(grid[cy+dy]&&grid[cy+dy][cx+dx]===PATH){
          pellets[cy+dy][cx+dx]=2; placed=true;
        }
      }
    }
  }
}

/* ═══════════════════════════════════════════
   ENTITIES
═══════════════════════════════════════════ */
const DIRS={U:{x:0,y:-1},D:{x:0,y:1},L:{x:-1,y:0},R:{x:1,y:0}};
let gameLevel=1, score=0, lives=3, eatenTotal=0, extraLivesGiven=0;
let ghostBaseSpeed=TILE*4.8; // se sobreescribe al iniciar
let pac, ghosts=[], frightMs=0;
let ghostBase={x:COLS-2, y:ROWS-2};
let wallColor=hsl(200,80,55);
let gameState='idle'; // 'idle' | 'playing' | 'dead' | 'levelup'

function tileCenter(x,y){return{cx:x*TILE+TILE/2,cy:y*TILE+TILE/2};}
function passable(tx,ty){return ty>=0&&ty<ROWS&&tx>=0&&tx<COLS&&grid[ty][tx]===PATH;}
function nbDirs(tx,ty){
  const a=[];
  if(passable(tx+1,ty))a.push(DIRS.R);
  if(passable(tx-1,ty))a.push(DIRS.L);
  if(passable(tx,ty+1))a.push(DIRS.D);
  if(passable(tx,ty-1))a.push(DIRS.U);
  return a;
}
function findSpawn(){
  for(let y=2;y<ROWS-2;y++) for(let x=2;x<COLS-2;x++){
    if(!passable(x,y)) continue;
    const opts=nbDirs(x,y);
    if(opts.length>=3) return{x,y,dir:DIRS.R};
  }
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(passable(x,y)) return{x,y,dir:DIRS.R};
  }
  return{x:1,y:1,dir:DIRS.R};
}

function resetLevel(isNew=false){
  makeGrid();
  wallColor=hsl(rnd(360),75,50);
  const spawn=findSpawn();
  ghostBase={x:COLS-2,y:ROWS-2};
  // ajustar ghostBase si no es accesible
  if(!passable(ghostBase.x,ghostBase.y)){
    outer: for(let y=ROWS-2;y>=1;y--) for(let x=COLS-2;x>=1;x--){
      if(passable(x,y)){ghostBase={x,y};break outer;}
    }
  }
  placePellets(spawn,ghostBase);
  const c0=tileCenter(spawn.x,spawn.y);
  pac={
    x:c0.cx,y:c0.cy,
    cellX:spawn.x, cellY:spawn.y,
    targetX:passable(spawn.x+1,spawn.y)?spawn.x+1:spawn.x, targetY:spawn.y,
    dir:DIRS.R,next:DIRS.R,
    speed:TILE*5.5,
    r:Math.max(4,Math.floor(TILE*.4)),
  };

  // Buscar 4 celdas libres distintas cerca del ghostBase para que cada fantasma arranque separado
  const ghostSpawns=findGhostSpawns(4);
  const ghostColors=['#FF4136','#FF69B4','#7FDBFF','#FF851B'];
  const ghostStartDirs=[DIRS.L,DIRS.U,DIRS.R,DIRS.D];
  ghosts=ghostColors.map((color,i)=>mkGhost(color,ghostSpawns[i],ghostStartDirs[i]));

  frightMs=0;
  ghosts.forEach(g=>g.speed=ghostBaseSpeed);
  if(isNew) SFX.level();
  updateHUD();
}

// Devuelve n celdas PATH distintas cercanas al ghostBase (BFS en espiral)
function findGhostSpawns(n){
  const found=[];
  const used=new Set();
  const bx=ghostBase.x, by=ghostBase.y;
  for(let r=0;r<=Math.max(COLS,ROWS)&&found.length<n;r++){
    for(let dy=-r;dy<=r&&found.length<n;dy++){
      for(let dx=-r;dx<=r&&found.length<n;dx++){
        if(Math.abs(dx)!==r&&Math.abs(dy)!==r) continue; // solo borde del cuadrado
        const x=bx+dx, y=by+dy;
        const k=x+','+y;
        if(x>=1&&x<COLS-1&&y>=1&&y<ROWS-1&&passable(x,y)&&!used.has(k)){
          used.add(k);
          found.push({x,y});
        }
      }
    }
  }
  // Completar con ghostBase si no hay suficientes
  while(found.length<n) found.push({x:ghostBase.x,y:ghostBase.y});
  return found;
}

function mkGhost(color,spawnCell,startDir){
  const c=tileCenter(spawnCell.x,spawnCell.y);
  let dir=startDir;
  if(!passable(spawnCell.x+dir.x,spawnCell.y+dir.y)){
    const opts=nbDirs(spawnCell.x,spawnCell.y);
    if(opts.length) dir=opts[rnd(opts.length)];
  }
  return{
    x:c.cx,y:c.cy,
    cellX:spawnCell.x, cellY:spawnCell.y,
    targetX:spawnCell.x+dir.x, targetY:spawnCell.y+dir.y,
    color,dir,next:dir,
    speed:ghostBaseSpeed,
    r:Math.max(4,Math.floor(TILE*.42)),
    fright:false
  };
}

/* ═══════════════════════════════════════════
   MOVIMIENTO
═══════════════════════════════════════════ */
function canMove(px,py,dx,dy,r){
  const nx=px+dx,ny=py+dy;
  const x0=Math.floor((nx-r)/TILE),x1=Math.floor((nx+r)/TILE);
  const y0=Math.floor((ny-r)/TILE),y1=Math.floor((ny+r)/TILE);
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){
    if(ty<0||ty>=ROWS||tx<0||tx>=COLS) return false;
    if(grid[ty][tx]===WALL){
      const cx2=clamp(nx,tx*TILE,tx*TILE+TILE);
      const cy2=clamp(ny,ty*TILE,ty*TILE+TILE);
      if((nx-cx2)**2+(ny-cy2)**2<=r*r) return false;
    }
  }
  return true;
}

/* ═══════════════════════════════════════════
   MOVIMIENTO PAC-MAN (pixel-based)
═══════════════════════════════════════════ */
function stepPac(dt){
  const sp=pac.speed*(dt/1000);
  // Mover hacia el centro del tile destino (igual que fantasmas)
  const tc=tileCenter(pac.targetX,pac.targetY);
  const dx=tc.cx-pac.x, dy=tc.cy-pac.y;
  const dist=Math.hypot(dx,dy);

  if(dist<=sp){
    // Llegó al centro del tile destino
    pac.x=tc.cx; pac.y=tc.cy;
    pac.cellX=pac.targetX; pac.cellY=pac.targetY;
    pacChooseNext();
  } else {
    pac.x+=dx/dist*sp;
    pac.y+=dy/dist*sp;
  }
}

function pacChooseNext(){
  const tx=pac.cellX, ty=pac.cellY;
  // Intentar la dirección pedida por el jugador primero
  if(pac.next && passable(tx+pac.next.x, ty+pac.next.y)){
    pac.dir=pac.next;
  } else if(!passable(tx+pac.dir.x, ty+pac.dir.y)){
    // Bloqueado en dirección actual y no hay dirección nueva válida — quedarse
    pac.targetX=tx; pac.targetY=ty;
    return;
  }
  pac.targetX=tx+pac.dir.x;
  pac.targetY=ty+pac.dir.y;
}

/* ═══════════════════════════════════════════
   MOVIMIENTO FANTASMAS — tile-by-tile robusto
   Cada fantasma mantiene: cellX,cellY (celda actual)
   y targetX,targetY (celda destino).
   Se mueve pixel a pixel hacia el centro del destino.
   Al llegar, elige el próximo destino con BFS o random.
═══════════════════════════════════════════ */
function ghostChooseNext(g){
  const tx=g.cellX, ty=g.cellY;
  if(g.fright){
    // Huida: aleatorio, sin U-turn
    const opts=nbDirs(tx,ty).filter(d=>!(d.x===-g.dir.x&&d.y===-g.dir.y));
    const choices=opts.length?opts:nbDirs(tx,ty);
    const d=choices[rnd(choices.length)];
    g.dir=d;
    g.targetX=tx+d.x; g.targetY=ty+d.y;
  } else {
    // Persecución: BFS hacia pac
    const ptx=Math.floor(pac.x/TILE), pty=Math.floor(pac.y/TILE);
    const d=bfs(tx,ty,ptx,pty);
    if(d && passable(tx+d.x,ty+d.y)){
      g.dir=d;
      g.targetX=tx+d.x; g.targetY=ty+d.y;
    } else {
      // Sin ruta (mismo tile) — seguir o girar
      const opts=nbDirs(tx,ty);
      if(opts.length){
        const d2=opts[rnd(opts.length)];
        g.dir=d2; g.targetX=tx+d2.x; g.targetY=ty+d2.y;
      }
    }
  }
}

function stepGhost(g,dt){
  const sp=g.speed*(dt/1000);
  const tc=tileCenter(g.targetX,g.targetY);
  const dx=tc.cx-g.x, dy=tc.cy-g.y;
  const dist=Math.hypot(dx,dy);
  if(dist<=sp){
    // Llegó al centro del destino
    g.x=tc.cx; g.y=tc.cy;
    g.cellX=g.targetX; g.cellY=g.targetY;
    ghostChooseNext(g);
  } else {
    g.x+=dx/dist*sp;
    g.y+=dy/dist*sp;
  }
}

/* BFS — devuelve dirección del primer paso hacia (tx,ty) desde (sx,sy) */
function bfs(sx,sy,tx,ty){
  if(sx===tx&&sy===ty) return null;
  const q=[[sx,sy]],seen=new Set([sx+','+sy]),prev=new Map();
  while(q.length){
    const [x,y]=q.shift();
    for(const d of nbDirs(x,y)){
      const nx=x+d.x,ny=y+d.y,k=nx+','+ny;
      if(!seen.has(k)){
        seen.add(k);prev.set(k,[x,y]);
        if(nx===tx&&ny===ty){
          let cx=nx,cy=ny,pk=k;
          while(true){
            const p=prev.get(pk);
            if(!p) break;
            if(p[0]===sx&&p[1]===sy)
              return{x:Math.sign(cx-sx)||0,y:Math.sign(cy-sy)||0};
            pk=p[0]+','+p[1];cx=p[0];cy=p[1];
          }
          return null;
        }
        q.push([nx,ny]);
      }
    }
  }
  return null;
}

/* ═══════════════════════════════════════════
   LÓGICA
═══════════════════════════════════════════ */
function eatDot(){
  const tx=Math.floor(pac.x/TILE),ty=Math.floor(pac.y/TILE);
  if(ty<=0||ty>=ROWS-1||tx<=0||tx>=COLS-1) return;
  if(pellets[ty][tx]===1){
    pellets[ty][tx]=0;score+=10;eatenTotal++;SFX.eat();
    if(Math.floor(eatenTotal/150)>extraLivesGiven){
      lives++;extraLivesGiven++;SFX.life();
    }
  } else if(pellets[ty][tx]===2){
    pellets[ty][tx]=0;score+=50;
    frightMs=6000;
    ghosts.forEach(g=>{g.fright=true;});
    SFX.power();
  }
  updateHUD();
}

function checkCollide(){
  for(const g of ghosts){
    if(Math.hypot(g.x-pac.x,g.y-pac.y)<g.r+pac.r-2){
      if(g.fright){
        score+=200;SFX.eatGhost();
        const gsp={x:ghostBase.x,y:ghostBase.y};
        const gc=tileCenter(gsp.x,gsp.y);
        g.x=gc.cx;g.y=gc.cy;
        g.cellX=gsp.x;g.cellY=gsp.y;
        const gopts=nbDirs(gsp.x,gsp.y);
        const gd=gopts.length?gopts[rnd(gopts.length)]:DIRS.R;
        g.dir=gd;g.targetX=gsp.x+gd.x;g.targetY=gsp.y+gd.y;
        g.fright=false;
        updateHUD();
      } else {
        die();
        return;
      }
    }
  }
}

function die(){
  lives--;
  SFX.die();
  updateHUD();
  gameState='dead';
  setTimeout(()=>{
    if(lives<=0){
      score=0;lives=3;gameLevel=1;eatenTotal=0;extraLivesGiven=0;
      resetLevel(false);
    } else {
      const sr=findSpawn();
      const s=tileCenter(sr.x,sr.y);
      pac.x=s.cx;pac.y=s.cy;
      pac.cellX=sr.x;pac.cellY=sr.y;
      pac.targetX=passable(sr.x+1,sr.y)?sr.x+1:sr.x;pac.targetY=sr.y;
      pac.dir=DIRS.R;pac.next=DIRS.R;
      // Re-spawn ghosts en celdas separadas
      const rs=findGhostSpawns(4);
      ghosts.forEach((g,i)=>{
        const sp=rs[i]||{x:ghostBase.x,y:ghostBase.y};
        const c=tileCenter(sp.x,sp.y);
        g.x=c.cx;g.y=c.cy;
        g.cellX=sp.x;g.cellY=sp.y;
        const opts=nbDirs(sp.x,sp.y);
        const d=opts.length?opts[rnd(opts.length)]:DIRS.R;
        g.dir=d;
        g.targetX=sp.x+d.x;g.targetY=sp.y+d.y;
        g.fright=false;
      });
    }
    gameState='playing';
  },900);
}

function allCleared(){
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++)
    if(pellets[y][x]) return false;
  return true;
}

/* ═══════════════════════════════════════════
   HUD
═══════════════════════════════════════════ */
function updateHUD(){
  $('score').textContent=score;
  $('level').textContent=gameLevel;
  const wrap=$('lives-wrap');
  wrap.innerHTML='';
  for(let i=0;i<Math.min(lives,6);i++){
    const d=document.createElement('div');
    d.className='life-icon';
    wrap.appendChild(d);
  }
}

/* ═══════════════════════════════════════════
   DIBUJO
═══════════════════════════════════════════ */
// Wall style: rounded tiles
function drawMaze(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,cvs.width,cvs.height);

  // Walls
  ctx.fillStyle=wallColor;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    if(grid[y][x]===WALL){
      const px=x*TILE,py=y*TILE;
      ctx.fillRect(px,py,TILE,TILE);
    }
  }

  // Inner wall border highlight
  ctx.fillStyle=`${wallColor.replace('hsl','hsla').replace(')',', .35)')}`;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    if(grid[y][x]===WALL){
      // Draw a 1px inner glow on edges adjacent to path
      const px=x*TILE,py=y*TILE;
      if(passable(x,y-1)||passable(x,y+1)||passable(x-1,y)||passable(x+1,y)){
        ctx.fillStyle='rgba(255,255,255,.08)';
        ctx.fillRect(px+1,py+1,TILE-2,TILE-2);
      }
    }
  }

  // Pellets
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    const p=pellets[y][x];
    if(!p) continue;
    if(p===1){
      const r2=Math.max(1.2,TILE*.09);
      ctx.fillStyle='#F0C040';
      ctx.beginPath();
      ctx.arc(x*TILE+TILE/2,y*TILE+TILE/2,r2,0,Math.PI*2);
      ctx.fill();
    } else if(p===2){
      // Power pellet con pulso
      const pulse=.75+.25*Math.sin(performance.now()/220);
      const r3=Math.max(2,TILE*.22)*pulse;
      ctx.fillStyle='#fff';
      ctx.shadowColor='#fff';ctx.shadowBlur=6;
      ctx.beginPath();
      ctx.arc(x*TILE+TILE/2,y*TILE+TILE/2,r3,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur=0;
    }
  }
}

function drawPac(){
  const r=pac.r;
  const t=performance.now();
  const open=(Math.sin(t/120)+1)/2*.42*Math.PI;
  const d=pac.dir;
  let base=0;
  if(d===DIRS.R) base=0;
  else if(d===DIRS.L) base=Math.PI;
  else if(d===DIRS.U) base=1.5*Math.PI;
  else base=.5*Math.PI;

  ctx.fillStyle='#FFD700';
  ctx.shadowColor='#FFD70066';ctx.shadowBlur=6;
  ctx.beginPath();
  ctx.moveTo(pac.x,pac.y);
  ctx.arc(pac.x,pac.y,r,base+open,base+2*Math.PI-open);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;

  // Eye
  const ex=pac.x+(d===DIRS.L?-r*.28:d===DIRS.R?r*.28:0)*1;
  const ey=pac.y+(d===DIRS.U?-r*.28:d===DIRS.D?r*.28:0)*1+(d===DIRS.L||d===DIRS.R?-r*.3:0);
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(ex+(d===DIRS.R?r*.18:d===DIRS.L?-r*.18:0),
          ey+(d===DIRS.D?r*.18:d===DIRS.U?-r*.18:0),
          Math.max(1,r*.17),0,Math.PI*2);
  ctx.fill();
}

function drawGhost(g){
  const T=TILE,hT=T/2;
  const x=g.x-hT,y=g.y-hT;
  const fright=g.fright;
  const flash=fright&&frightMs<2000&&Math.sin(performance.now()/100)>0;
  const bodyColor=flash?'#fff':fright?'#1A6FFF':g.color;

  ctx.fillStyle=bodyColor;
  ctx.shadowColor=bodyColor+'88';ctx.shadowBlur=6;
  ctx.beginPath();
  // Cuerpo superior redondeado
  ctx.arc(x+hT,y+T*.38,T*.38,Math.PI,0,false);
  // Lado derecho
  ctx.lineTo(x+T*.95,y+T*.92);
  // Zigzag inferior
  const waves=3;
  for(let i=waves;i>=0;i--){
    const px=x+T*(i/waves);
    ctx.lineTo(px, y+T*(i%2===0?.92:.72));
  }
  ctx.lineTo(x+T*.05,y+T*.92);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;

  // Ojos (si no está asustado)
  if(!fright){
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(x+T*.33,y+T*.36,T*.12,T*.16,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+T*.65,y+T*.36,T*.12,T*.16,0,0,Math.PI*2);ctx.fill();
    const dx=g.dir.x*.04*T,dy=g.dir.y*.04*T;
    ctx.fillStyle='#002288';
    ctx.beginPath();ctx.ellipse(x+T*.33+dx,y+T*.36+dy,T*.07,T*.09,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+T*.65+dx,y+T*.36+dy,T*.07,T*.09,0,0,Math.PI*2);ctx.fill();
  } else {
    // Cara asustada
    ctx.fillStyle=flash?'#f00':'#fff';
    ctx.beginPath();ctx.arc(x+T*.32,y+T*.4,T*.09,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+T*.65,y+T*.4,T*.09,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=flash?'#f00':'#fff';ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x+T*.22,y+T*.62);
    for(let i=0;i<4;i++)ctx.lineTo(x+T*(.22+i*.18), y+T*(i%2===0?.56:.68));
    ctx.lineTo(x+T*.78,y+T*.62);
    ctx.stroke();
  }
}

/* Score flash */
const popups=[];
function addPopup(x,y,text){
  popups.push({x,y,text,age:0,life:900});
}
function drawPopups(dt){
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    p.age+=dt;
    if(p.age>p.life){popups.splice(i,1);continue;}
    const a=1-p.age/p.life;
    ctx.globalAlpha=a;
    ctx.fillStyle='#FFF';
    ctx.font=`bold ${Math.max(9,TILE*.7)}px 'Courier New'`;
    ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y-p.age*.025);
    ctx.globalAlpha=1;
  }
}

/* ═══════════════════════════════════════════
   INPUT
═══════════════════════════════════════════ */
let touchOrigin=null;
document.addEventListener('touchstart',e=>{
  initAudio();
  if(e.touches[0]) touchOrigin={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('touchend',e=>{
  if(!touchOrigin) return;
  const dx=e.changedTouches[0].clientX-touchOrigin.x;
  const dy=e.changedTouches[0].clientY-touchOrigin.y;
  if(Math.abs(dx)>Math.abs(dy)){
    pac.next=dx>0?DIRS.R:DIRS.L;
  } else {
    pac.next=dy>0?DIRS.D:DIRS.U;
  }
  touchOrigin=null;
},{passive:false});
document.addEventListener('keydown',e=>{
  initAudio();
  const m={ArrowUp:DIRS.U,ArrowDown:DIRS.D,ArrowLeft:DIRS.L,ArrowRight:DIRS.R,
            w:DIRS.U,s:DIRS.D,a:DIRS.L,d:DIRS.R,
            W:DIRS.U,S:DIRS.D,A:DIRS.L,D:DIRS.R};
  if(m[e.key]) pac.next=m[e.key];
});

/* ═══════════════════════════════════════════
   INICIO / OVERLAY
═══════════════════════════════════════════ */
const overlay=$('overlay');
const DIFF_SPEEDS={easy:TILE*2.8, normal:TILE*4.8, hard:TILE*5.5};
let selectedDiff='normal';

document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    initAudio();
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiff=btn.dataset.diff;
  });
});

$('startBtn').addEventListener('click',()=>{
  initAudio();
  if(AC) AC.resume();
  // Aplicar velocidad según dificultad
  const spd=DIFF_SPEEDS[selectedDiff]||DIFF_SPEEDS.normal;
  ghosts.forEach(g=>g.speed=spd);
  ghostBaseSpeed=spd;
  overlay.style.display='none';
  gameState='playing';
  SFX.start();
});

/* ═══════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════ */
let lastT=performance.now();

function gameLoop(now){
  const dt=Math.min(now-lastT,50); // cap a 50ms para evitar saltos
  lastT=now;

  if(gameState==='playing'){
    // Fright timer
    if(frightMs>0){
      frightMs-=dt;
      if(frightMs<=0){frightMs=0;ghosts.forEach(g=>g.fright=false);}
    }

    stepPac(dt);
    eatDot();

    for(const g of ghosts){
      stepGhost(g,dt);
    }

    checkCollide();

    if(allCleared()){
      gameLevel++;
      // Aumentar velocidad levemente
      resetLevel(true);
    }
  }

  // Dibujar siempre
  drawMaze();
  if(gameState!=='idle') drawPac();
  for(const g of ghosts) drawGhost(g);
  drawPopups(dt);

  requestAnimationFrame(gameLoop);
}

/* ═══════════════════════════════════════════
   ARRANQUE
═══════════════════════════════════════════ */
resetLevel(false);
updateHUD();
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(gameLoop);});

})();
